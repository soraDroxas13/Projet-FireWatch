<div class="popup-alerte" *ngIf="alerteActive"
      [ngClass]="alerteActive.niveau"
      (click)="fermer()">
   <div class="popup-icone">
     <svg *ngIf="alerteActive.niveau === 'critique'" viewBox="0 0 24 24" fill="none" stroke-width="2">
       <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
       <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
     </svg>
     <svg *ngIf="alerteActive.niveau === 'alerte'" viewBox="0 0 24 24" fill="none" stroke-width="2">
       <circle cx="12" cy="12" r="10"/>
       <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
     </svg>
   </div>
   <div class="popup-texte">
     <div class="popup-titre">{{ alerteActive.titre }}</div>
     <div class="popup-detail">{{ alerteActive.detail }}</div>
     <div class="popup-heure">{{ alerteActive.heure }}</div>
   </div>
   <div class="popup-fermer">✕</div>
 </div>
